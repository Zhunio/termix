services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /opt/termix/data:/app/data
    environment:
      - NODE_ENV=production
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
    depends_on:
      - guacd

  guacd:
    image: guacamole/guacd:1.6.0
    restart: unless-stopped
